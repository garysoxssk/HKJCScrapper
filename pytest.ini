[pytest]
# Test configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests that call live HKJC API (deselect with '-m "not integration"')

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not integration"

# Disable warnings for cleaner output
filterwarnings =
    ignore::DeprecationWarning
