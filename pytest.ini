[pytest]
# Test configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests that call live HKJC API (deselect with '-m "not integration"')
    mongodb: Tests that require a running MongoDB instance (deselect with '-m "not mongodb"')

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not integration and not mongodb"

# Disable warnings for cleaner output
filterwarnings =
    ignore::DeprecationWarning
