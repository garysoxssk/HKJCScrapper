services:
  mongodb:
    image: mongo:8
    container_name: hkjc-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  scrapper:
    build: .
    container_name: hkjc-scrapper
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=hkjc
      - GRAPHQL_ENDPOINT=https://info.cld.hkjc.com/graphql/base/
      - DISCOVERY_INTERVAL_SECONDS=900
      - LOG_LEVEL=INFO
    # Override command for one-shot mode:
    #   docker compose run --rm scrapper uv run python -m hkjc_scrapper.main --once

volumes:
  mongodb_data:
